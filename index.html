<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="소방용수">
  <title>인천중부소방서 소방용수 위치도</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root { --fire-red:#d32f2f; --fire-dark:#8e0000; --bg-light:#f0f2f5; --surface:#ffffff; --border-color:#e2e5e9; --text:#1a1d21; --text-sub:#6b7280; --card-shadow:0 1px 3px rgba(0,0,0,0.06); --card-shadow-hover:0 4px 12px rgba(0,0,0,0.1); --radius:14px; --radius-sm:10px; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
    html,body { background:var(--bg-light); color:var(--text); width:100%; height:100%; font-family:'Noto Sans KR',sans-serif; }
    header { background:linear-gradient(135deg,#c62828 0%,#d32f2f 50%,#e53935 100%); color:#fff; padding:0 20px; height:60px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:2000; box-shadow:0 4px 20px rgba(211,47,47,0.3); }
    .header-icon { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .header-icon .material-icons { font-size:20px; }
    header h1 { font-size:17px; font-weight:900; line-height:1.2; }
    header h1 small { display:block; font-size:11px; font-weight:400; opacity:0.8; margin-top:2px; }
    .search-panel { background:var(--surface); padding:16px 20px; border-bottom:1px solid var(--border-color); display:flex; flex-direction:column; gap:10px; }
    .tab-bar { display:flex; gap:4px; background:var(--bg-light); border-radius:var(--radius-sm); padding:3px; }
    .tab-btn { flex:1; height:36px; border-radius:8px; border:none; font-size:13px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all 0.2s; }
    .tab-btn.active { background:var(--fire-red); color:#fff; }
    .tab-btn:not(.active) { background:transparent; color:var(--text-sub); }
    .search-row { display:flex; gap:8px; }
    input[type="search"] { flex:1; height:48px; padding:0 16px; border:1.5px solid var(--border-color); border-radius:var(--radius-sm); font-size:16px !important; font-family:'Noto Sans KR',sans-serif; background:var(--bg-light); color:var(--text); outline:none; -webkit-appearance:none; }
    input:focus { border-color:var(--fire-red); background:#fff; }
    .btn-icon { width:48px; height:48px; flex-shrink:0; background:var(--fire-red); color:#fff; border:none; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .btn-gps { height:48px; border:none; border-radius:var(--radius-sm); background:linear-gradient(135deg,#1565c0,#1976d2); color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; width:100%; }
    .btn-gps .material-icons { font-size:20px; }
    .map-wrapper { position:relative; height:45vh; min-height:260px; margin:12px 16px; border-radius:var(--radius); overflow:hidden; border:1.5px solid var(--border-color); box-shadow:var(--card-shadow); }
    #map { width:100%; height:100%; }
    .btn-reload { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:1000; background:var(--surface); color:var(--fire-red); border:2px solid var(--fire-red); padding:8px 18px; border-radius:24px; font-size:13px; font-weight:700; font-family:'Noto Sans KR',sans-serif; display:none; align-items:center; gap:6px; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.12); }
    .loading-overlay { position:absolute; inset:0; background:rgba(255,255,255,0.85); display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:500; }
    .loading-overlay.on { display:flex; }
    .spinner { width:36px; height:36px; border-radius:50%; border:3px solid var(--border-color); border-top-color:var(--fire-red); animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-overlay p { font-size:13px; color:var(--text-sub); font-weight:500; }
    .result-wrap { padding:0 16px 40px; }
    .result-header { display:flex; align-items:center; justify-content:space-between; padding:14px 0 8px; font-size:13px; color:var(--text-sub); }
    .result-header strong { color:var(--fire-red); font-size:16px; font-weight:900; }
    .legend { display:flex; flex-wrap:wrap; gap:6px; padding-bottom:12px; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-sub); font-weight:500; background:var(--surface); padding:4px 10px 4px 6px; border-radius:20px; border:1px solid var(--border-color); }
    .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .hydrant-card { background:var(--surface); border:1.5px solid var(--border-color); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; cursor:pointer; display:flex; align-items:flex-start; gap:12px; box-shadow:var(--card-shadow); }
    .h-icon-wrap { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .h-icon-wrap svg { width:24px; height:24px; }
    .h-info { flex:1; min-width:0; }
    .h-name { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--text); }
    .h-meta { font-size:12px; color:var(--text-sub); line-height:1.7; }
    .h-area-badge { display:inline-flex; align-items:center; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; color:#fff; }
    .h-dist { font-size:13px; font-weight:700; flex-shrink:0; padding:5px 10px; border-radius:var(--radius-sm); background:#ffebee; color:var(--fire-red); }
    .empty-state { text-align:center; padding:48px 20px; color:var(--text-sub); font-size:14px; line-height:1.9; }
    .empty-state .material-icons { font-size:48px; color:#d0d5dd; display:block; margin-bottom:12px; }
    .pop-window { padding:12px 14px; min-width:220px; max-width:270px; font-family:'Noto Sans KR',sans-serif; }
    .pop-header { font-size:14px; font-weight:700; color:var(--fire-red); margin-bottom:8px; border-bottom:2px solid #ffcdd2; padding-bottom:6px; }
    .pop-body { font-size:12px; color:var(--text); line-height:1.8; }
    .pop-body b { color:var(--text-sub); font-weight:500; }
    .pop-nav-btn { display:flex; align-items:center; justify-content:center; gap:5px; margin-top:10px; padding:9px 0; width:100%; background:linear-gradient(135deg,#c62828,#d32f2f); color:#fff; border:none; border-radius:var(--radius-sm); font-size:12px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; text-decoration:none; }
    .in-use-badge { display:inline-flex; align-items:center; gap:4px; background:#fff3e0; color:#e65100; border:1.5px solid #ffb74d; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; animation:blink-badge 1.5s ease-in-out infinite; }
    @keyframes blink-badge { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .pop-use-btn { display:flex; align-items:center; justify-content:center; gap:5px; margin-top:8px; padding:9px 0; width:100%; border:none; border-radius:var(--radius-sm); font-size:12px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
    .pop-use-btn.use { background:linear-gradient(135deg,#e65100,#f57c00); color:#fff; }
    .pop-use-btn.clear { background:linear-gradient(135deg,#2e7d32,#43a047); color:#fff; }
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a1d21; color:#fff; font-size:13px; font-weight:500; padding:12px 24px; border-radius:28px; z-index:9999; white-space:nowrap; transition:transform 0.3s; font-family:'Noto Sans KR',sans-serif; box-shadow:0 8px 32px rgba(0,0,0,0.25); pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-icon"><span class="material-icons">local_fire_department</span></div>
  <h1>소방용수 위치도 <small>인천중부소방서</small></h1>
</header>

<div class="search-panel">
  <div class="tab-bar">
    <button id="tabAddr" class="tab-btn active" onclick="switchTab('addr')">주소 검색</button>
    <button id="tabName" class="tab-btn" onclick="switchTab('name')">명칭 검색</button>
  </div>
  <div id="panelAddr">
    <div class="search-row">
      <input type="search" id="searchAddr" placeholder="지번 또는 도로명 주소 검색">
      <button class="btn-icon" onclick="searchAddress()"><span class="material-icons" style="font-size:20px">search</span></button>
    </div>
  </div>
  <div id="panelName" style="display:none;">
    <div class="search-row">
      <input type="search" id="searchName" placeholder="소화전 명칭 검색 (예: 중앙278)">
      <button class="btn-icon" onclick="searchByName()"><span class="material-icons" style="font-size:20px">search</span></button>
    </div>
  </div>
  <button class="btn-gps" onclick="getLocation()">
    <span class="material-icons">my_location</span>현위치 주변 찾기
  </button>
</div>

<div class="map-wrapper">
  <div id="map"></div>
  <button id="btnReload" class="btn-reload" onclick="searchAtCenter()">
    <span class="material-icons" style="font-size:15px">refresh</span>이 위치에서 재검색
  </button>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>소방용수 검색 중...</p>
  </div>
</div>

<div class="result-wrap">
  <div class="result-header"><span id="resultCount">위치를 검색하세요</span></div>
  <div class="legend" id="legend"></div>
  <div id="h-list-result">
    <div class="empty-state">
      <span class="material-icons">place</span>
      주소 검색 또는 현위치 버튼을<br>눌러 주변 소방용수를 확인하세요
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycby3tISpouySVhMorJLrZTjlfLrcBJi0AVqZhS2N1B0QPTYzCyv2YXuX-qCjoj9W81Xl/exec';
var AREA_COLORS={'101':'#2563eb','102':'#dc2626','103':'#16a34a','104':'#9333ea','105':'#ea580c','106':'#0891b2','107':'#db2777','108':'#6b7280'};
var AREA_NAMES={'101':'1구역','102':'2구역','103':'3구역','104':'4구역','105':'5구역','106':'6구역','107':'7구역','108':'8구역'};
var inUseSet=new Set();
var map,geocoder,myMarker,activePopWindow,markers=[];
var lastSearchData=null,lastSearchType=null;

function apiGet(p){return fetch(API_URL+'?'+new URLSearchParams(p).toString()).then(function(r){return r.json();});}
function apiPost(b){return fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(function(r){return r.json();});}

function initMap(){
  map=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.473,126.632),level:3});
  geocoder=new kakao.maps.services.Geocoder();
  activePopWindow=new kakao.maps.InfoWindow({removable:true});
  kakao.maps.event.addListener(map,'dragend',function(){document.getElementById('btnReload').style.display='flex';});
  kakao.maps.event.addListener(map,'click',function(){if(activePopWindow)activePopWindow.close();});
  kakao.maps.event.addListener(map,'zoom_start',function(){if(activePopWindow)activePopWindow.close();});
  document.getElementById('searchAddr').addEventListener('keyup',function(e){if(e.key==='Enter')searchAddress();});
  document.getElementById('searchName').addEventListener('keyup',function(e){if(e.key==='Enter')searchByName();});
  loadInUseStatus();
}

function getAreaColor(a){var s=String(a||'');for(var k in AREA_COLORS){if(s.includes(k))return AREA_COLORS[k];}return'#dc2626';}
function getAreaKey(a){var s=String(a||'');for(var k in AREA_COLORS){if(s.includes(k))return k;}return null;}

function makeHydrantSVG(color,areaKey,isInUse){
  var c=isInUse?'%23bdbdbd':color.replace('#','%23');
  var n=AREA_NAMES[areaKey]?AREA_NAMES[areaKey].replace('구역',''):'';
  return'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44"><path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 26 18 26s18-12.5 18-26C36 8.06 27.94 0 18 0z" fill="'+c+'"/><circle cx="18" cy="17" r="11" fill="white" opacity="0.95"/>'+
  (isInUse?'<text x="18" y="21" text-anchor="middle" font-size="13" fill="%23e65100">!</text>':'<text x="18" y="14" text-anchor="middle" font-size="7" font-weight="700" fill="'+c+'" font-family="sans-serif">'+n+'</text><path d="M15 16 L18 22 L21 16 Q18 18 15 16Z" fill="'+c+'" opacity="0.9"/>')+
  '</svg>';
}
function makeIconHTML(color,areaKey,isInUse){
  var ic=isInUse?'#bdbdbd':color;
  return'<div class="h-icon-wrap" style="background:'+ic+'20;"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8 2 6 5 6 8c0 2 1 3.5 2 4.5V14h1v3h2v2h2v-2h2v-3h1v-1.5c1-1 2-2.5 2-4.5 0-3-2-6-6-6z" fill="'+ic+'" opacity="0.85"/><circle cx="12" cy="8" r="2.5" fill="white" opacity="0.9"/></svg></div>';
}

var toastTimer;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},2800);}
function setLoading(on){document.getElementById('loadingOverlay').classList.toggle('on',on);}

function loadInUseStatus(cb){
  apiGet({action:'getInUse'}).then(function(list){inUseSet=new Set((list||[]).map(function(h){return h.name;}));if(cb)cb();}).catch(function(){if(cb)cb();});
}
function handleUseBtn(name){
  showToast('처리 중...');
  apiPost({action:'setInUse',name:name}).then(function(){inUseSet.add(name);showToast('🔴 '+name+' 사용 시작!');if(activePopWindow)activePopWindow.close();refreshCurrentView();}).catch(function(){showToast('처리 실패.');});
}
function handleClearBtn(name){
  apiPost({action:'clearInUse',name:name}).then(function(){inUseSet.delete(name);showToast('✅ '+name+' 사용 해제!');if(activePopWindow)activePopWindow.close();refreshCurrentView();}).catch(function(){showToast('처리 실패.');});
}
function refreshCurrentView(){if(!lastSearchData)return;loadInUseStatus(function(){if(lastSearchType==='name')drawByName(lastSearchData);else drawHydrants(lastSearchData);});}

function makePopup(h,showDist){
  var addr=h.addr.replace('인천광역시 ','');
  var isInUse=inUseSet.has(h.name);
  var nav='https://map.kakao.com/link/to/'+encodeURIComponent(h.name)+','+h.lat+','+h.lng;
  var sn=h.name.replace(/'/g,"\\'");
  var badge=isInUse?'<div style="margin-bottom:6px"><span class="in-use-badge">⚠ 사용중</span></div>':'';
  var btn=isInUse?'<button class="pop-use-btn clear" onclick="handleClearBtn(\''+sn+'\')">✅ 사용 해제</button>':'<button class="pop-use-btn use" onclick="handleUseBtn(\''+sn+'\')">🚒 사용</button>';
  return'<div class="pop-window"><div class="pop-header">🔴 '+h.name+'</div><div class="pop-body">'+badge+(showDist?'<b>거리</b> '+h.dist+'m<br>':'')+'<b>주소</b> '+addr+'<br><b>상세위치</b> '+h.desc+'<br><b>용수구역</b> '+h.area+'</div>'+btn+'<a class="pop-nav-btn" href="'+nav+'" target="_blank" style="margin-top:6px;">🧭 경로탐색 (카카오맵)</a></div>';
}

function createMyMarker(loc){
  if(myMarker)myMarker.setMap(null);
  myMarker=new kakao.maps.Marker({map:map,position:loc,zIndex:10});
}
function fetchNearby(lat,lng){
  setLoading(true);
  loadInUseStatus(function(){apiGet({action:'nearby',lat:lat,lng:lng}).then(function(data){setLoading(false);drawHydrants(data);}).catch(function(){setLoading(false);showToast('검색 실패.');});});
}
function searchAtCenter(){
  document.getElementById('btnReload').style.display='none';
  var c=map.getCenter();createMyMarker(c);if(activePopWindow)activePopWindow.close();fetchNearby(c.getLat(),c.getLng());
}
function searchAddress(){
  var val=document.getElementById('searchAddr').value.trim();if(!val)return;
  geocoder.addressSearch(val,function(result,status){
    if(status!==kakao.maps.services.Status.OK){showToast('주소를 찾지 못했습니다.');return;}
    var loc=new kakao.maps.LatLng(result[0].y,result[0].x);
    map.setCenter(loc);map.setLevel(3);document.getElementById('btnReload').style.display='none';if(activePopWindow)activePopWindow.close();createMyMarker(loc);fetchNearby(result[0].y,result[0].x);
  });
}
function getLocation(){
  if(!navigator.geolocation){showToast('위치 기능을 지원하지 않습니다.');return;}
  showToast('위치 확인 중...');
  navigator.geolocation.getCurrentPosition(function(pos){
    var loc=new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude);
    map.setCenter(loc);map.setLevel(3);document.getElementById('btnReload').style.display='none';if(activePopWindow)activePopWindow.close();createMyMarker(loc);fetchNearby(pos.coords.latitude,pos.coords.longitude);
  },function(err){
    var msgs={1:'위치 접근이 거부되었습니다.',2:'위치를 확인할 수 없습니다.',3:'위치 요청이 초과되었습니다.'};showToast(msgs[err.code]||'위치 확인에 실패했습니다.');
  },{timeout:10000,maximumAge:60000});
}
function switchTab(mode){
  var isAddr=mode==='addr';
  document.getElementById('panelAddr').style.display=isAddr?'':'none';
  document.getElementById('panelName').style.display=isAddr?'none':'';
  document.getElementById('tabAddr').className='tab-btn'+(isAddr?' active':'');
  document.getElementById('tabName').className='tab-btn'+(isAddr?'':' active');
}
function searchByName(){
  var kw=document.getElementById('searchName').value.trim();if(!kw)return;
  if(activePopWindow)activePopWindow.close();setLoading(true);
  loadInUseStatus(function(){
    apiGet({action:'searchByName',keyword:kw}).then(function(data){
      setLoading(false);if(!data||data.length===0){showToast('"'+kw+'" 명칭을 찾지 못했습니다.');return;}
      map.setCenter(new kakao.maps.LatLng(data[0].lat,data[0].lng));map.setLevel(4);document.getElementById('btnReload').style.display='none';drawByName(data);
    }).catch(function(){setLoading(false);showToast('검색 실패.');});
  });
}

function drawHydrants(list){
  lastSearchData=list;lastSearchType='nearby';
  markers.forEach(function(m){m.setMap(null);});markers=[];
  var box=document.getElementById('h-list-result'),countEl=document.getElementById('resultCount'),legendEl=document.getElementById('legend');
  box.innerHTML='';legendEl.innerHTML='';
  if(!list||list.length===0){countEl.innerHTML='검색 결과 없음';box.innerHTML='<div class="empty-state"><span class="material-icons">search_off</span>반경 1,000m 이내에<br>소방용수가 없습니다.</div>';return;}
  countEl.innerHTML='반경 1,000m 이내 <strong>'+list.length+'개</strong>';
  var ua=[];list.forEach(function(h){var k=getAreaKey(h.area);if(k&&ua.indexOf(k)===-1)ua.push(k);});
  ua.forEach(function(k){var el=document.createElement('div');el.className='legend-item';el.innerHTML='<div class="legend-dot" style="background:'+AREA_COLORS[k]+'"></div>'+(AREA_NAMES[k]||k);legendEl.appendChild(el);});
  list.forEach(function(h){_renderCard(h,true);});
}
function drawByName(list){
  lastSearchData=list;lastSearchType='name';
  markers.forEach(function(m){m.setMap(null);});markers=[];
  var box=document.getElementById('h-list-result'),countEl=document.getElementById('resultCount'),legendEl=document.getElementById('legend');
  box.innerHTML='';legendEl.innerHTML='';
  countEl.innerHTML='명칭 검색 결과 <strong>'+list.length+'개</strong>';
  list.forEach(function(h){_renderCard(h,false);});
}
function _renderCard(h,showDist){
  var isInUse=inUseSet.has(h.name);
  var color=getAreaColor(h.area);var areaKey=getAreaKey(h.area);
  var position=new kakao.maps.LatLng(h.lat,h.lng);
  var shortAddr=h.addr.replace('인천광역시 ','');
  var areaLabel=areaKey?AREA_NAMES[areaKey]:'';
  var marker=new kakao.maps.Marker({map:map,position:position,image:new kakao.maps.MarkerImage(makeHydrantSVG(color,areaKey||'',isInUse),new kakao.maps.Size(36,44),{offset:new kakao.maps.Point(18,44)})});
  markers.push(marker);
  var iw=new kakao.maps.InfoWindow({content:makePopup(h,showDist)});
  var openInfo=(function(h,iw,marker,showDist){return function(){if(activePopWindow)activePopWindow.close();iw.setContent(makePopup(h,showDist));iw.open(map,marker);activePopWindow=iw;map.panTo(marker.getPosition());};})(h,iw,marker,showDist);
  kakao.maps.event.addListener(marker,'click',openInfo);
  var card=document.createElement('div');card.className='hydrant-card';card.style.borderColor=isInUse?'#ffb74d':'';
  card.innerHTML=makeIconHTML(color,areaKey||'',isInUse)+'<div class="h-info"><div class="h-name">'+h.name+(isInUse?' <span class="in-use-badge">⚠ 사용중</span>':'')+'</div><div class="h-meta">'+shortAddr+'<br><span class="h-area-badge" style="background:'+color+'">'+(areaLabel||h.area)+'</span> '+h.desc+'</div></div>'+(showDist?'<div class="h-dist">'+h.dist+'m</div>':'');
  card.onclick=openInfo;
  document.getElementById('h-list-result').appendChild(card);
}
</script>
